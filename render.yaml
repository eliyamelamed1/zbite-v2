services:
  - type: web
    name: zbite
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: starter
    healthCheckPath: /api/health
    disk:
      name: zbite-uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_URL
        value: https://zbite.onrender.com
      - key: UPLOADS_DIR
        value: /var/data/uploads
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: PRERENDER_TOKEN
        sync: false
